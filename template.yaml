AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  prod-voice-meeting-minutes — Meeting recording to meeting minutes pipeline.
  HK (ap-east-1) for processing, cross-region Bedrock (ap-southeast-1) for summarization,
  cross-region SES (ap-southeast-1) for email.

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  SESFromEmail:
    Type: String
    Default: minutes@msphk.info
    Description: SES verified sender email (in ap-southeast-1)

  ProcessorImageUri:
    Type: String
    Default: "036293420772.dkr.ecr.ap-east-1.amazonaws.com/prod-voice-meeting-minutes-processor:latest"
    Description: ECR image URI for processor container (update after first push)

  ProcessorAmiId:
    Type: String
    Default: "ami-031e7d8cb5001a0b4"
    Description: Custom AMI ID with pre-baked ML models (from EC2 Image Builder). Leave empty to use default ECS-optimized AMI.


# =============================================================================
# Conditions
# =============================================================================
Conditions:
  HasCustomAmi: !Not [!Equals [!Ref ProcessorAmiId, ""]]

# =============================================================================
# Globals
# =============================================================================
Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Architectures:
      - x86_64
    Environment:
      Variables:
        JOBS_TABLE: !Ref JobsTable
        DATA_BUCKET: !Ref DataBucket
        SES_REGION: ap-southeast-1
        BEDROCK_REGION: ap-northeast-1
        SES_FROM_EMAIL: !Ref SESFromEmail
        SES_IDENTITY_ARN: arn:aws:ses:ap-southeast-1:507088713162:identity/msphk.info
    Tags:
      Project: voice-meeting-minutes
      ManagedBy: AWS SAM
      Env: PROD
      created-by: austin.leung@ecloudvalley.com

# =============================================================================
# Resources
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # VPC — 192.168.255.128/25, 4 subnets (/28), no NAT GW
  # ---------------------------------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 192.168.255.128/25
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: prod-voice-meeting-minutes-vpc
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: prod-voice-meeting-minutes-igw
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # --- Public Subnets ---
  PublicSubnet1a:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 192.168.255.128/28
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: prod-voice-meeting-minutes-public-1a
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  PublicSubnet1b:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 192.168.255.144/28
      AvailabilityZone: !Sub "${AWS::Region}b"
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: prod-voice-meeting-minutes-public-1b
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  # --- Private Subnets ---
  PrivateSubnet1a:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 192.168.255.160/28
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: prod-voice-meeting-minutes-private-1a
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  PrivateSubnet1b:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 192.168.255.176/28
      AvailabilityZone: !Sub "${AWS::Region}b"
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: prod-voice-meeting-minutes-private-1b
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  # --- Route Tables ---
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: prod-voice-meeting-minutes-public-rt
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1aRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1a
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet1bRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1b
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: prod-voice-meeting-minutes-private-rt
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  PrivateSubnet1aRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1a
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet1bRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1b
      RouteTableId: !Ref PrivateRouteTable

  # ---------------------------------------------------------------------------
  # S3 Bucket
  # ---------------------------------------------------------------------------
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "prod-voice-meeting-minutes-data-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - "*"
            AllowedMethods:
              - PUT
              - GET
            AllowedHeaders:
              - "*"
            MaxAge: 3600
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteInputFiles
            Prefix: "jobs/"
            Status: Enabled
            ExpirationInDays: 14
          - Id: AbortIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      Tags:
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  # ---------------------------------------------------------------------------
  # DynamoDB Table
  # ---------------------------------------------------------------------------
  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: prod-voice-meeting-minutes-jobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-created_at-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  # ---------------------------------------------------------------------------
  # API Gateway
  # ---------------------------------------------------------------------------
  MeetingApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: prod-voice-meeting-minutes-api
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Api-Key,Authorization'"
      Auth:
        DefaultAuthorizer: CognitoAuth
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuth:
            UserPoolArn: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/ap-east-1_6BilvzaAu"
      Tags:
        Project: voice-meeting-minutes
        ManagedBy: AWS SAM
        Env: PROD
        created-by: austin.leung@ecloudvalley.com

  # ---------------------------------------------------------------------------
  # Lambda Functions
  # ---------------------------------------------------------------------------
  SubmitJobFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prod-voice-meeting-minutes-submit-job
      Handler: handler.lambda_handler
      CodeUri: lambdas/submit_job/
      Timeout: 30
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
      Events:
        PostJob:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingApi
            Path: /jobs
            Method: post

  StartPipelineFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prod-voice-meeting-minutes-start-pipeline
      Handler: handler.lambda_handler
      CodeUri: lambdas/start_pipeline/
      Timeout: 30
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref PipelineStateMachine
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref JobsTable
        - StepFunctionsExecutionPolicy:
            StateMachineName: !GetAtt PipelineStateMachine.Name
      Events:
        S3Upload:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.s3
              detail-type:
                - "Object Created"
              detail:
                bucket:
                  name:
                    - !Ref DataBucket
                object:
                  key:
                    - prefix: "jobs/"
                    - suffix: ".mp4"

  MergeTranscriptFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prod-voice-meeting-minutes-merge-transcript
      Handler: handler.lambda_handler
      CodeUri: lambdas/merge_transcript/
      Timeout: 300
      MemorySize: 512
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket

  SummarizeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prod-voice-meeting-minutes-summarize
      Handler: handler.lambda_handler
      CodeUri: lambdas/summarize/
      Timeout: 900
      MemorySize: 256
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
        - DynamoDBReadPolicy:
            TableName: !Ref JobsTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
              Condition:
                StringEquals:
                  "aws:RequestedRegion":
                    - "ap-southeast-1"
                    - "ap-northeast-1"

  NotifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prod-voice-meeting-minutes-notify
      Handler: handler.lambda_handler
      CodeUri: lambdas/notify/
      Timeout: 60
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DataBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
                - ses:SendBulkEmail
              Resource: "*"
              Condition:
                StringEquals:
                  "aws:RequestedRegion": "ap-southeast-1"

  ListJobsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prod-voice-meeting-minutes-list-jobs
      Handler: handler.lambda_handler
      CodeUri: lambdas/list_jobs/
      Timeout: 10
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref JobsTable
      Events:
        ListJobs:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingApi
            Path: /jobs
            Method: get

  GetStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prod-voice-meeting-minutes-get-status
      Handler: handler.lambda_handler
      CodeUri: lambdas/get_status/
      Timeout: 10
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref JobsTable
      Events:
        GetStatus:
          Type: Api
          Properties:
            RestApiId: !Ref MeetingApi
            Path: /jobs/{job_id}
            Method: get

  # ---------------------------------------------------------------------------
  # Scheduled Lambda — Cleanup orphan uploads (status=uploaded > 24h)
  # ---------------------------------------------------------------------------
  CleanupOrphansFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: prod-voice-meeting-minutes-cleanup-orphans
      Handler: handler.lambda_handler
      CodeUri: lambdas/cleanup_orphans/
      Timeout: 300
      MemorySize: 256
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 0 * * ? *)
            Description: Daily cleanup of orphan uploads older than 24h
            Enabled: true

  # ---------------------------------------------------------------------------
  # Step Functions
  # ---------------------------------------------------------------------------
  PipelineStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: prod-voice-meeting-minutes-pipeline
      DefinitionUri: statemachine/pipeline.asl.json
      DefinitionSubstitutions:
        JobsTable: !Ref JobsTable
        DataBucket: !Ref DataBucket
        MergeTranscriptFunctionArn: !GetAtt MergeTranscriptFunction.Arn
        SummarizeFunctionArn: !GetAtt SummarizeFunction.Arn
        NotifyFunctionArn: !GetAtt NotifyFunction.Arn
        ProcessorJobDefinition: !Ref ProcessorJobDefinition
        ProcessorJobQueue: !Ref ProcessorJobQueue
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref MergeTranscriptFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref SummarizeFunction
        - LambdaInvokePolicy:
            FunctionName: !Ref NotifyFunction
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - batch:SubmitJob
                - batch:DescribeJobs
                - batch:TerminateJob
              Resource: "*"
            - Effect: Allow
              Action:
                - events:PutTargets
                - events:PutRule
                - events:DescribeRule
              Resource: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/StepFunctionsGetEventsForBatchJobsRule"
      Tags:
        Project: voice-meeting-minutes
        ManagedBy: AWS SAM
        Env: PROD
        created-by: austin.leung@ecloudvalley.com

  # ---------------------------------------------------------------------------
  # ECR Repository
  # ---------------------------------------------------------------------------
  ProcessorRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: prod-voice-meeting-minutes-processor
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 5 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 5
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  # ---------------------------------------------------------------------------
  # Batch — Security Group
  # ---------------------------------------------------------------------------
  BatchSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: prod-voice-meeting-minutes-batch-sg
      GroupDescription: Security group for Batch compute instances
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound (S3, ECR, etc.)
      Tags:
        - Key: Name
          Value: prod-voice-meeting-minutes-batch-sg
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  # ---------------------------------------------------------------------------
  # Batch — IAM Roles
  # ---------------------------------------------------------------------------
  BatchInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: prod-voice-meeting-minutes-batch-instance-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  BatchInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: prod-voice-meeting-minutes-batch-instance-profile
      Roles:
        - !Ref BatchInstanceRole

  BatchSpotFleetRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: prod-voice-meeting-minutes-spot-fleet-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: spotfleet.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2SpotFleetTaggingRole
      Tags:
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  BatchJobRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: prod-voice-meeting-minutes-batch-job-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub "${DataBucket.Arn}/*"
      Tags:
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  # ---------------------------------------------------------------------------
  # Batch — Compute Environment, Job Queue, Job Definition
  # ---------------------------------------------------------------------------
  BatchComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      # Name auto-generated by CloudFormation to avoid replacement conflicts
      Type: MANAGED
      State: ENABLED
      ComputeResources:
        Type: SPOT
        AllocationStrategy: SPOT_CAPACITY_OPTIMIZED
        BidPercentage: 100
        SpotIamFleetRole: !GetAtt BatchSpotFleetRole.Arn
        MinvCpus: 0
        MaxvCpus: 4
        DesiredvCpus: 0
        InstanceTypes:
          - g4dn.xlarge
        Ec2Configuration:
          - ImageType: ECS_AL2023_NVIDIA
            ImageIdOverride: !If [HasCustomAmi, !Ref ProcessorAmiId, !Ref "AWS::NoValue"]
        Subnets:
          - !Ref PublicSubnet1a
          - !Ref PublicSubnet1b
        SecurityGroupIds:
          - !Ref BatchSecurityGroup
        InstanceRole: !GetAtt BatchInstanceProfile.Arn
        Ec2KeyPair: prod-voice-meeting-minutes-batch-key
        Tags:
          Project: voice-meeting-minutes
          ManagedBy: AWS SAM
          Env: PROD
          created-by: austin.leung@ecloudvalley.com

  ProcessorJobQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      # Name auto-generated by CloudFormation
      State: ENABLED
      Priority: 1
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref BatchComputeEnvironment
      Tags:
        Project: voice-meeting-minutes
        ManagedBy: AWS SAM
        Env: PROD
        created-by: austin.leung@ecloudvalley.com

  ProcessorJobDefinition:
    Type: AWS::Batch::JobDefinition
    Properties:
      # Name auto-generated by CloudFormation
      Type: container
      ContainerProperties:
        Image: !Ref ProcessorImageUri
        ResourceRequirements:
          - Type: VCPU
            Value: "4"
          - Type: MEMORY
            Value: "15000"
          - Type: GPU
            Value: "1"
        Volumes:
          - Name: processor
            Host:
              SourcePath: /opt/processor
          - Name: ffmpeg
            Host:
              SourcePath: /usr/local/bin
        MountPoints:
          - ContainerPath: /opt/processor
            SourceVolume: processor
            ReadOnly: false
          - ContainerPath: /usr/local/bin
            SourceVolume: ffmpeg
            ReadOnly: true
        Environment:
          - Name: HF_TOKEN
            Value: "{{resolve:secretsmanager:prod-voice-meeting-minutes/hf-token:SecretString:HF_TOKEN}}"
          - Name: PYTHONUNBUFFERED
            Value: "1"
        JobRoleArn: !GetAtt BatchJobRole.Arn
        ExecutionRoleArn: !GetAtt BatchJobRole.Arn
        LogConfiguration:
          LogDriver: awslogs
          Options:
            awslogs-group: !Ref ProcessorLogGroup
            awslogs-region: !Ref AWS::Region
            awslogs-stream-prefix: processor
      RetryStrategy:
        Attempts: 3
        EvaluateOnExit:
          - OnReason: "Host EC2*"
            Action: RETRY
          - OnStatusReason: "Host EC2*"
            Action: RETRY
          - OnExitCode: "0"
            Action: EXIT
      Timeout:
        AttemptDurationSeconds: 3600
      Tags:
        Project: voice-meeting-minutes
        ManagedBy: AWS SAM
        Env: PROD
        created-by: austin.leung@ecloudvalley.com

  # ---------------------------------------------------------------------------
  # CodeBuild — Build + Push Processor Container
  # HF token secret managed outside this stack: prod-voice-meeting-minutes/hf-token
  # ---------------------------------------------------------------------------
  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: prod-voice-meeting-minutes-codebuild-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource: !GetAtt ProcessorRepository.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/prod-voice-meeting-minutes-build*"
              - Effect: Allow
                Action:
                  - codecommit:GitPull
                Resource: !Sub "arn:aws:codecommit:${AWS::Region}:${AWS::AccountId}:prod-voice-meeting-minutes"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketAcl
                  - s3:GetBucketLocation
                Resource:
                  - !Sub "arn:aws:s3:::aws-sam-cli-managed-default-samclisourcebucket-*"
                  - !Sub "arn:aws:s3:::aws-sam-cli-managed-default-samclisourcebucket-*/*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:prod-voice-meeting-minutes/*"
              - Effect: Allow
                Action:
                  - batch:RegisterJobDefinition
                  - batch:DescribeJobDefinitions
                Resource: "*"
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt BatchJobRole.Arn
      Tags:
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: prod-voice-meeting-minutes-build
      Description: Build and push processor container to ECR
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Source:
        Type: CODECOMMIT
        Location: https://git-codecommit.ap-east-1.amazonaws.com/v1/repos/prod-voice-meeting-minutes
        GitCloneDepth: 1
        BuildSpec: !Sub |
          version: 0.2
          env:
            variables:
              ECR_REPO: prod-voice-meeting-minutes-processor
              AWS_DEFAULT_REGION: ${AWS::Region}
              ACCOUNT_ID: ${AWS::AccountId}
            secrets-manager:
              HF_TOKEN: prod-voice-meeting-minutes/hf-token:HF_TOKEN
          phases:
            pre_build:
              commands:
                - ECR_URI="${!ACCOUNT_ID}.dkr.ecr.${!AWS_DEFAULT_REGION}.amazonaws.com/${!ECR_REPO}"
                - aws ecr get-login-password --region ${!AWS_DEFAULT_REGION} | docker login --username AWS --password-stdin ${!ACCOUNT_ID}.dkr.ecr.${!AWS_DEFAULT_REGION}.amazonaws.com
                - IMAGE_TAG=$(date +%Y%m%d-%H%M%S)
            build:
              commands:
                - echo "Building processor image..."
                - cd containers/processor
                - docker build --build-arg HF_TOKEN=${!HF_TOKEN} -t ${!ECR_REPO}:${!IMAGE_TAG} -t ${!ECR_REPO}:latest .
            post_build:
              commands:
                - docker tag ${!ECR_REPO}:${!IMAGE_TAG} ${!ECR_URI}:${!IMAGE_TAG}
                - docker tag ${!ECR_REPO}:latest ${!ECR_URI}:latest
                - docker push ${!ECR_URI}:${!IMAGE_TAG}
                - docker push ${!ECR_URI}:latest
                - echo "Done! Image ${!ECR_URI}:${!IMAGE_TAG}"
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_LARGE
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        PrivilegedMode: true
        EnvironmentVariables: []
      TimeoutInMinutes: 60
      Tags:
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  CodeBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/codebuild/prod-voice-meeting-minutes-build
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  # ---------------------------------------------------------------------------
  # Batch — CloudWatch Logs
  # ---------------------------------------------------------------------------
  ProcessorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/batch/prod-voice-meeting-minutes-processor
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  # ---------------------------------------------------------------------------
  # EC2 Image Builder — Custom AMI with ML models
  # Base: ECS-optimized AL2023 GPU AMI
  # ---------------------------------------------------------------------------
  ImageBuilderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: prod-voice-meeting-minutes-imagebuilder-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/EC2InstanceProfileForImageBuilder
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:prod-voice-meeting-minutes/*"
      Tags:
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  ImageBuilderInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: prod-voice-meeting-minutes-imagebuilder-profile
      Roles:
        - !Ref ImageBuilderRole

  ImageBuilderComponent:
    Type: AWS::ImageBuilder::Component
    Properties:
      Name: prod-voice-meeting-minutes-processor-setup
      Platform: Linux
      Version: "1.0.9"
      Description: Install Python, ML packages (Whisper, pyannote, GOT-OCR), pre-download models
      Uri: !Sub "s3://prod-voice-meeting-minutes-data-${AWS::AccountId}/imagebuilder/component.json"
      Tags:
        Project: voice-meeting-minutes
        ManagedBy: AWS SAM
        Env: PROD
        created-by: austin.leung@ecloudvalley.com

  ImageBuilderRecipe:
    Type: AWS::ImageBuilder::ImageRecipe
    Properties:
      Name: prod-voice-meeting-minutes-processor-recipe
      Version: "1.0.9"
      ParentImage: !Sub "{{resolve:ssm:/aws/service/ecs/optimized-ami/amazon-linux-2023/gpu/recommended/image_id}}"
      Components:
        - ComponentArn: !Ref ImageBuilderComponent
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 35
            VolumeType: gp3
      Tags:
        Project: voice-meeting-minutes
        ManagedBy: AWS SAM
        Env: PROD
        created-by: austin.leung@ecloudvalley.com

  ImageBuilderInfraConfig:
    Type: AWS::ImageBuilder::InfrastructureConfiguration
    Properties:
      Name: prod-voice-meeting-minutes-infra-config
      InstanceProfileName: !Ref ImageBuilderInstanceProfile
      InstanceTypes:
        - g4dn.xlarge
      SubnetId: !Ref PublicSubnet1a
      SecurityGroupIds:
        - !Ref BatchSecurityGroup
      TerminateInstanceOnFailure: true
      Tags:
        Project: voice-meeting-minutes
        ManagedBy: AWS SAM
        Env: PROD
        created-by: austin.leung@ecloudvalley.com

  ImageBuilderDistribution:
    Type: AWS::ImageBuilder::DistributionConfiguration
    Properties:
      Name: prod-voice-meeting-minutes-distribution
      Distributions:
        - Region: !Ref AWS::Region
          AmiDistributionConfiguration:
            Name: "prod-voice-meeting-minutes-processor-{{ imagebuilder:buildDate }}"
            AmiTags:
              Project: voice-meeting-minutes
              ManagedBy: AWS SAM
              Env: PROD
              created-by: austin.leung@ecloudvalley.com
      Tags:
        Project: voice-meeting-minutes
        ManagedBy: AWS SAM
        Env: PROD
        created-by: austin.leung@ecloudvalley.com

  ImageBuilderPipeline:
    Type: AWS::ImageBuilder::ImagePipeline
    Properties:
      Name: prod-voice-meeting-minutes-pipeline
      ImageRecipeArn: !Ref ImageBuilderRecipe
      InfrastructureConfigurationArn: !Ref ImageBuilderInfraConfig
      DistributionConfigurationArn: !Ref ImageBuilderDistribution
      Status: ENABLED
      Tags:
        Project: voice-meeting-minutes
        ManagedBy: AWS SAM
        Env: PROD
        created-by: austin.leung@ecloudvalley.com

  # ---------------------------------------------------------------------------
  # Frontend S3 Bucket + CloudFront
  # ---------------------------------------------------------------------------
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "prod-voice-meeting-minutes-frontend-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: prod-voice-meeting-minutes-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: "Precis — Meeting Minutes Frontend"
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_200
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
      Tags:
        - Key: Project
          Value: voice-meeting-minutes
        - Key: ManagedBy
          Value: AWS SAM
        - Key: Env
          Value: PROD
        - Key: created-by
          Value: austin.leung@ecloudvalley.com

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${MeetingApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  DataBucketName:
    Description: S3 data bucket name
    Value: !Ref DataBucket

  JobsTableName:
    Description: DynamoDB jobs table name
    Value: !Ref JobsTable

  StateMachineArn:
    Description: Step Functions state machine ARN
    Value: !Ref PipelineStateMachine

  ProcessorEcrUri:
    Description: ECR repository URI for processor container
    Value: !GetAtt ProcessorRepository.RepositoryUri

  BatchJobQueueArn:
    Description: Batch job queue ARN
    Value: !Ref ProcessorJobQueue

  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  PublicSubnets:
    Description: Public subnet IDs
    Value: !Join [",", [!Ref PublicSubnet1a, !Ref PublicSubnet1b]]

  PrivateSubnets:
    Description: Private subnet IDs
    Value: !Join [",", [!Ref PrivateSubnet1a, !Ref PrivateSubnet1b]]

  CodeBuildProjectName:
    Description: CodeBuild project name for building processor container
    Value: !Ref CodeBuildProject

  ImageBuilderPipelineArn:
    Description: EC2 Image Builder pipeline ARN (run to build custom AMI)
    Value: !Ref ImageBuilderPipeline

  CloudFrontUrl:
    Description: Frontend URL (CloudFront)
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"

  FrontendBucketName:
    Description: Frontend S3 bucket name
    Value: !Ref FrontendBucket

